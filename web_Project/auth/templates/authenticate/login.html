<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .box {
            background: white;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .box h2 {
            margin-bottom: 25px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2d8cf0;
        }

        p {
            margin-top: 15px;
            font-size: 14px;
        }

        a {
            color: #4facfe;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

          .success {
            color: green;
            background: #e6ffe6;
            padding: 10px;
            border-radius: 5px;
        }

        .error {
            color: red;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 5px;
        }

        @media(max-width:500px) {

            .box {
                margin: 20px;
                padding: 30px;
            }

        }
    </style>

</head>

<body>

    <div class="box">

        <h2>Login</h2>

        <form method="POST">

            <input type="email" name="email" placeholder="Email Address" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <p>
            Don't have an account?
            <a href="{{ url_for('auth.signUp') }}">Signup</a>
           <p> <a href="{{ url_for('auth.forget_password') }}">Forget Password</a></p>
        </p>

        <div class="showmessage">
            {% with messages =get_flashed_messages(with_categories=true)%}

            {% if messages %}:

            {% for category,message in messages %}
            
            <div class="{{ category }}">{{ message }}</div>
          {% if category == 'success' %}
            <script>
                setTimeout(() => {
                    window.location.href = "{{ url_for('home.showHome') }}";
                }, 3000); 
            </script>
            {% else %}
            <script>
                setTimeout(() => {
                    window.location.href = "{{ url_for('auth.login') }}";
                }, 3000);
                </script>
               {% endif %}
            {% endfor %}

            {% endif %}

            {% endwith %}
        </div>
    </div>

</body>

</html>
