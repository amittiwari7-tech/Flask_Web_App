<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>User Form</title>
</head>

<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow">
        <div class="card-header text-center bg-primary text-white">
          <h4>User Registration</h4>
        </div>

        <div class="card-body">

          <form method="POST" action="{{ url_for('home.updateData') }}" enctype="multipart/form-data">

            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" name="name" placeholder="Enter Name" required value="{{name}}">
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="email" placeholder="Enter Email" required value="{{email}}">
            </div>

            <div class="mb-3">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" name="age" placeholder="Enter Age" required value="{{age}}">
            </div>

            <div class="mb-3">
              <label class="form-label">Age</label>
              <input type="file" class="form-control" name="image" >
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Submit</button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
